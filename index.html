<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Don't Press The Button</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dfe7f3);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:95%;
    max-width:600px;
    background:white;
    padding:24px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
    text-align:center;
    position:relative;
}

.fade{
    animation:fade .3s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}

h1,h2{margin:10px 0}

button{
    width:100%;
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:999px;
    margin-top:15px;
    cursor:pointer;
    transition:.2s;
}

button:active{transform:scale(.96)}

.red{
    background:#e53935;
    color:white;
    animation:pulse 1.5s infinite;
}

.green{background:#43a047;color:white;}
.blue{background:#1976d2;color:white;}

@keyframes pulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.05)}
}

/* progress */
.progress{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    margin-top:15px;
}
.bar{
    height:100%;
    width:0%;
    background:#43a047;
}

/* catch game */
#catchArea{
    position:relative;
    height:320px;
    border:2px dashed #ccc;
    border-radius:16px;
    margin-top:15px;
}

#jumpBtn{
    position:absolute;
    width:140px;
}

/* confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-20px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}

/* shake */
.shake{animation:shake .4s}

@keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-6px)}
    80%{transform:translateX(6px)}
}

.notice{
    margin-top:10px;
    font-size:14px;
    color:#444;
}
</style>
</head>

<body>

<div class="container" id="container">
    <div id="app"></div>
</div>

<script>

let screen = 0;
let taps = 0;
let hits = 0;

const app = document.getElementById("app");
const container = document.getElementById("container");

function vibrate(ms){
    if(navigator.vibrate) navigator.vibrate(ms);
}

function render(){

app.classList.add("fade");
setTimeout(()=>app.classList.remove("fade"),300);

if(screen === 0){
app.innerHTML = `
<h2>Don't press the red button.</h2>
<button class="red" onclick="next()">🔴 Red Button</button>
`;
}

else if(screen === 1){
app.innerHTML = `
<h2>I literally told you not to press it.</h2>
<button class="red" onclick="next()">🔴 Red Button</button>
`;
}

else if(screen === 2){
app.innerHTML = `
<h2>Why are you still doing this?</h2>
<button class="red" onclick="next()">🔴 Red Button</button>
`;
}

else if(screen === 3){
app.innerHTML = `
<h1>🏆 Achievement Unlocked</h1>
<p>Curiosity +10 XP</p>
<button class="blue" onclick="next()">Continue</button>
`;
vibrate(80);
}

else if(screen === 4){

let patience = 70 + Math.floor(Math.random()*20);

app.innerHTML = `
<h2>Analyzing User...</h2>

<p>Curiosity: 100%</p>
<p>Patience: ${patience}%</p>
<p>Rule Following: 0%</p>

<p class="notice">"Does not read instructions clearly."</p>

<button class="blue" onclick="next()">Continue</button>
`;
}

else if(screen === 5){
taps = 0;

app.innerHTML = `
<h2>Tap Challenge</h2>
<p>Tap 20 times in 5 seconds</p>

<h2 id="counter">0 / 20</h2>
<h2 id="timer">5</h2>

<button class="red" id="tapBtn">TAP</button>
<p class="notice" id="msg"></p>
`;

startTap();
}

else if(screen === 6){
hits = 0;

app.innerHTML = `
<h2>Catch The Button</h2>
<p>Catch it 10 times</p>

<h2 id="hits">0 / 10</h2>

<div id="catchArea">
<button id="jumpBtn" class="red">Catch Me</button>
</div>

<p class="notice" id="msg"></p>
`;

startCatch();
}

else if(screen === 7){
app.innerHTML = `
<h2>🏆 Achievements</h2>
<p>✓ Ignored Instructions</p>
<p>✓ Persistent Clicking</p>
<p>✓ Mobile Tap Master</p>
<p>✓ Button Hunter</p>

<button class="blue" onclick="next()">Continue</button>
`;
}

else if(screen === 8){
app.innerHTML = `
<h2>Final Analysis</h2>

<p>Curiosity: 100%</p>
<p>Persistence: 100%</p>
<p>Rule Following: 0%</p>

<p><b>"Exactly the type of person we expected."</b></p>

<button class="blue" onclick="next()">Show Reward</button>
`;
}

else if(screen === 9){
confetti();

app.innerHTML = `
<h1>🎁 Reward Unlocked</h1>
<p>You made it.</p>

<button class="green" onclick="reward()">Claim Reward</button>
`;
}

}

function next(){
screen++;
render();
}

function startTap(){

let time = 5;
const btn = document.getElementById("tapBtn");

btn.onclick = ()=>{
taps++;
document.getElementById("counter").innerText = `${taps} / 20`;
vibrate(20);
};

let timer = setInterval(()=>{

time--;
document.getElementById("timer").innerText = time;

if(time <= 0){
clearInterval(timer);

if(taps >= 20){
document.getElementById("msg").innerText = "That was impressive.";
vibrate(80);
} else {
document.getElementById("msg").innerText = "We expected more.";
}

setTimeout(next, 1200);
}

},1000);
}

function startCatch(){

const area = document.getElementById("catchArea");
const btn = document.getElementById("jumpBtn");

move();

btn.onclick = ()=>{

hits++;
document.getElementById("hits").innerText = `${hits} / 10`;

vibrate(20);

if(hits === 3) setMsg("Beginner luck.");
if(hits === 6) setMsg("Still going?");
if(hits >= 10){
setMsg("Fine. You win.");
setTimeout(next, 600);
return;
}

move();
};

function move(){
const maxX = area.clientWidth - btn.offsetWidth;
const maxY = area.clientHeight - btn.offsetHeight;

btn.style.left = Math.random()*maxX + "px";
btn.style.top = Math.random()*maxY + "px";
}

function setMsg(t){
document.getElementById("msg").innerText = t;
}
}

function confetti(){
for(let i=0;i<120;i++){
const c = document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

function reward(){
const msg = encodeURIComponent(
"I failed the test successfully. 🎁\n\nWhat's my reward?"
);

window.location.href =
`https://wa.me/41797285953?text=${msg}`;
}

render();

</script>

</body>
</html>
