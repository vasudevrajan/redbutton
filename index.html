<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Don't Press The Button</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f5f7fa,#e8edf5);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}
.container{
    background:white;
    width:95%;
    max-width:600px;
    padding:28px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
    position:relative;
    overflow:hidden;
}
.fade{
    animation:fade .35s ease;
}
@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}
h1,h2{margin-top:0}
button{
    border:none;
    border-radius:999px;
    padding:18px 24px;
    width:100%;
    font-size:20px;
    cursor:pointer;
    margin-top:16px;
    transition:.2s;
}
button:active{
    transform:scale(.97);
}
.red{
    background:#e53935;
    color:white;
    animation:pulse 1.5s infinite;
}
.green{
    background:#43a047;
    color:white;
}
.blue{
    background:#1976d2;
    color:white;
}
@keyframes pulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.05)}
}
.progress{
    width:100%;
    height:20px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    margin-top:16px;
}
.bar{
    width:0%;
    height:100%;
    background:#43a047;
    transition:.2s;
}
.badge{
    background:#f4f4f4;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    text-align:left;
}
.trophy{
    font-size:60px;
    animation:pop .5s ease;
}
@keyframes pop{
    0%{transform:scale(0)}
    100%{transform:scale(1)}
}
#catchArea{
    position:relative;
    height:320px;
    border:2px dashed #ddd;
    border-radius:16px;
    margin-top:16px;
}
#jumpBtn{
    position:absolute;
    width:120px;
}
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>
<body>
<div class="container">
    <div id="app"></div>
</div>
<script>
let screen = 0;
let tapCount = 0;
let catchCount = 0;
const screens = [
"warn1",
"warn2",
"warn3",
"achievement",
"analysis",
"tapgame",
"catchgame",
"summary",
"finalanalysis",
"reward"
];
function next(){
    screen++;
    render();
}
function render(){
const app = document.getElementById("app");
const current = screens[screen];
if(current==="warn1"){
app.innerHTML=`
<div class="fade">
<h2>Don't press the red button.</h2>
<button class="red" onclick="next()">🔴 Red Button</button>
</div>`;
}
else if(current==="warn2"){
app.innerHTML=`
<div class="fade">
<h2>I literally just told you not to press it.</h2>
<button class="red" onclick="next()">🔴 Red Button</button>
</div>`;
}
else if(current==="warn3"){
app.innerHTML=`
<div class="fade">
<h2>Why are you still doing this?</h2>
<button class="red" onclick="next()">🔴 Red Button</button>
</div>`;
}
else if(current==="achievement"){
app.innerHTML=`
<div class="fade">
<div class="trophy">🏆</div>
<h2>Achievement Unlocked</h2>
<p>Curiosity +10 XP</p>
<button class="blue" onclick="next()">Continue</button>
</div>`;
}
else if(current==="analysis"){
const patience = Math.floor(Math.random()*40)+60;
app.innerHTML=`
<div class="fade">
<h2>Analyzing User...</h2>
<div class="badge">Curiosity: 100%</div>
<div class="badge">Patience: ${patience}%</div>
<div class="badge">Rule Following: 0%</div>
<p><b>Verdict:</b><br>
Extremely unlikely to read warning labels.</p>
<button class="blue" onclick="next()">Continue</button>
</div>`;
}
else if(current==="tapgame"){
app.innerHTML=`
<div class="fade">
<h2>One Final Test</h2>
<p>Tap the button 20 times in 5 seconds</p>
<h3 id="counter">0 / 20</h3>
<h3 id="timer">5</h3>
<button id="tapBtn" class="red">TAP TAP TAP</button>
</div>`;
startTapGame();
}
else if(current==="catchgame"){
app.innerHTML=`
<div class="fade">
<h2>Catch The Button</h2>
<p>Catch it 10 times.</p>
<h3 id="hits">0 / 10</h3>
<div id="catchArea">
<button id="jumpBtn" class="red">Catch Me</button>
</div>
</div>`;
startCatchGame();
}
else if(current==="summary"){
app.innerHTML=`
<div class="fade">
<h2>🏆 Achievements</h2>
<div class="badge">✓ Ignored Instructions</div>
<div class="badge">✓ Persistent Clicking</div>
<div class="badge">✓ Mobile Tap Master</div>
<div class="badge">✓ Button Hunter</div>
<div class="badge">✓ Certified Rule Breaker</div>
<button class="blue" onclick="next()">Continue</button>
</div>`;
}
else if(current==="finalanalysis"){
app.innerHTML=`
<div class="fade">
<h2>Final Analysis</h2>
<div class="badge">Curiosity: 100%</div>
<div class="badge">Persistence: 100%</div>
<div class="badge">Rule Following: 0%</div>
<p><b>Verdict:</b><br>
Exactly the type of person we expected.</p>
<button class="blue" onclick="next()">Show Reward</button>
</div>`;
}
else if(current==="reward"){
launchConfetti();
app.innerHTML=`
<div class="fade">
<h1>🎁 REWARD UNLOCKED</h1>
<p>
You ignored every instruction,
completed every challenge,
and somehow made it this far.
</p>
<button class="green" onclick="claimReward()">
Claim Reward
</button>
</div>`;
}
}
function startTapGame(){
tapCount = 0;
let time = 5;
const btn = document.getElementById("tapBtn");
btn.onclick = ()=>{
tapCount++;
document.getElementById("counter").innerText =
tapCount + " / 20";
};
const interval = setInterval(()=>{
time--;
document.getElementById("timer").innerText = time;
if(time<=0){
clearInterval(interval);
setTimeout(()=>{
next();
},500);
}
},1000);
}
function startCatchGame(){
catchCount = 0;
const area = document.getElementById("catchArea");
const btn = document.getElementById("jumpBtn");
moveButton();
btn.onclick = ()=>{
catchCount++;
document.getElementById("hits").innerText =
catchCount + " / 10";
if(catchCount===3){
alert("Beginner luck.");
}
if(catchCount===6){
alert("You're taking this seriously.");
}
if(catchCount>=10){
alert("Fine. You win.");
next();
return;
}
moveButton();
};
function moveButton(){
const maxX = area.clientWidth - 130;
const maxY = area.clientHeight - 70;
btn.style.left = Math.random()*maxX + "px";
btn.style.top = Math.random()*maxY + "px";
}
}
function launchConfetti(){
for(let i=0;i<120;i++){
const c = document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=
`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}
function claimReward(){
const message = encodeURIComponent(
"I failed the test successfully. 🎁\n\nWhat's my reward?"
);
window.location.href =
`https://wa.me/41797285953?text=${message}`;
}
render();
</script>
</body>
</html>
