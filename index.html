<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Press The Button</title>
<style>
*{
    box-sizing:border-box;
}
body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#f5f7fa,#e4e8ee);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
}
.container{
    background:white;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:550px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    position:relative;
}
.fade{
    animation:fadeIn .4s ease;
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
button{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:18px;
    cursor:pointer;
    transition:.25s;
    margin-top:20px;
}
button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}
.red{
    background:#e53935;
    color:white;
    animation:pulse 1.5s infinite;
}
.green{
    background:#43a047;
    color:white;
}
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
.shake{
    animation:shake .4s;
}
@keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
}
.achievement{
    font-size:48px;
    margin-bottom:10px;
    animation:pop .6s ease;
}
@keyframes pop{
    0%{
        transform:scale(0);
        opacity:0;
    }
    80%{
        transform:scale(1.2);
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}
.progress{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    margin-top:20px;
}
.bar{
    height:100%;
    width:0%;
    background:#43a047;
    transition:.3s;
}
#runawayBtn{
    position:relative;
}
.confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>
<body>
<div class="container" id="container">
    <div id="app"></div>
</div>
<script>
let step = 0;
const steps = [
{
title:"Don't press the red button.",
button:"🔴 Red Button"
},
{
title:"I literally just told you not to press it.",
button:"🔴 Red Button"
},
{
title:"Why are you insisting on this?",
button:"🔴 Red Button"
},
{
title:"🏆 Achievement Unlocked",
text:"+10 XP — Curiosity",
button:"Continue"
},
{
title:"Seriously?",
text:"Most people would have stopped by now.",
button:"Keep Going"
},
{
title:"I'm running out of patience...",
text:"This is getting ridiculous.",
button:"Fine..."
},
{
title:"Catch me if you can 😈",
text:"The button has decided to fight back.",
button:"Try To Click Me",
runaway:true
},
{
title:"Verifying stubbornness level...",
loading:true
},
{
title:"🎁 Reward Unlocked!",
text:"You passed the test by ignoring every instruction.",
button:"Claim Reward",
reward:true
}
];
function render(){
const s = steps[step];
let html = `<div class="fade">`;
if(step === 3){
html += `<div class="achievement">🏆</div>`;
}
html += `<h2>${s.title}</h2>`;
if(s.text){
html += `<p>${s.text}</p>`;
}
if(s.loading){
html += `
<div class="progress">
<div class="bar" id="bar"></div>
</div>
`;
}else{
html += `
<button
id="${s.runaway ? 'runawayBtn' : ''}"
class="${s.reward ? 'green' : 'red'}"
onclick="nextStep()">
${s.button}
</button>
`;
}
html += `</div>`;
document.getElementById("app").innerHTML = html;
if(s.runaway){
setupRunaway();
}
if(s.loading){
startLoading();
}
}
function nextStep(){
if(step > 0 && step < 7){
shakeScreen();
}
if(step < steps.length - 1){
step++;
render();
}
else{
claimReward();
}
}
function shakeScreen(){
const c = document.getElementById("container");
c.classList.add("shake");
setTimeout(()=>{
c.classList.remove("shake");
},400);
}
function setupRunaway(){
const btn = document.getElementById("runawayBtn");
btn.addEventListener("mouseenter",()=>{
const x = Math.random()*250 - 125;
const y = Math.random()*120 - 60;
btn.style.transform =
`translate(${x}px,${y}px)`;
});
}
function startLoading(){
let progress = 0;
const interval = setInterval(()=>{
progress += Math.random()*18;
if(progress > 100){
progress = 100;
}
document.getElementById("bar").style.width =
progress + "%";
if(progress >= 100){
clearInterval(interval);
setTimeout(()=>{
step++;
render();
},600);
}
},250);
}
function confetti(){
for(let i=0;i<100;i++){
const piece =
document.createElement("div");
piece.classList.add("confetti");
piece.style.left =
Math.random()*100 + "vw";
piece.style.background =
`hsl(${Math.random()*360},100%,50%)`;
piece.style.animationDuration =
(2 + Math.random()*2) + "s";
document.body.appendChild(piece);
setTimeout(()=>{
piece.remove();
},4000);
}
}
function claimReward(){
confetti();
setTimeout(()=>{
const phone = "41797285953";
const code = "QR_GAME_V2";
const message = encodeURIComponent(
"I failed the test successfully. 🎁\n\n"
);
window.location.href =
`https://wa.me/${phone}?text=${message}`;
},1800);
}
render();
</script>
</body>
</html>
